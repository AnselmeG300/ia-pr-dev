<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestion des Services{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #333;
            color: white;
            padding: 20px;
            margin: -20px -20px 20px -20px;
            text-align: center;
        }
        
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .category-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        
        .category-title {
            color: #333;
            margin-top: 0;
            font-size: 1.5em;
        }
        
        .service-list {
            list-style-type: none;
            padding: 0;
        }
        
        .service-item {
            background-color: white;
            border: 1px solid #eee;
            border-radius: 3px;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .service-name {
            font-weight: bold;
            color: #555;
        }
        
        .service-price {
            color: #28a745;
            font-weight: bold;
        }
        
        .service-description {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .nav-link {
            color: #007bff;
            text-decoration: none;
            padding: 5px 10px;
            border: 1px solid #007bff;
            border-radius: 3px;
            display: inline-block;
            margin: 10px 0;
        }
        
        .nav-link:hover {
            background-color: #007bff;
            color: white;
        }
        
        .no-services {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{% block header %}Gestion des Catégories et Services{% endblock %}</h1>
    </div>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
